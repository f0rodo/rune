name: Candle backend

on:
  push:
    branches: [master]
  pull_request:

jobs:
  candle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-candle-${{ github.sha }}
      - name: Setup Rust
        run: rustup show
      - name: Test Candle feature
        run: cargo test -p hotg-rune-runtime --no-default-features --features candle,builtins
